<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Restaurante</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* 🔥 PANTALLA INICIAL */
#inicio {
  height: 100vh;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding: 40px;
  background: url('inicio.jpg') no-repeat center center/cover;
  color: white;
  position: relative;
}

#inicio::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

#inicio div {
  position: relative;
  z-index: 1;
  max-width: 300px;
}

#inicio h1 {
  font-size: 32px;
}

#inicio button {
  font-size: 18px;
  padding: 12px 20px;
}

/* HEADER */
header {
  background: #ff5722;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

/* MENU */
.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
  background: #f4f4f4;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
}

.card p {
  margin: 0 10px 10px;
  color: gray;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  width: 85%;
  max-width: 400px;
}

.modal-content img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  background: #ff5722;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  cursor: pointer;
}

/* CARRITO */
.carrito-box {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- 🔥 INICIO -->
<div id="inicio">
  <div>
    <h1>Bienvenido a Flash Burguer</h1>
    <p>Disfruta de los mejores platos desde casa</p>
    <button onclick="verMenu()">Ver menú</button>
  </div>
</div>

<!-- MENU -->
<div id="menu" style="display:none;">

<header>Menú de comida rápida</header>

<div class="menu">

<div class="card" onclick="abrir('Aritos de cebolla','Cortados a mano, envueltos en una mezcla ligera y fritos hasta alcanzar un dorado perfecto','7200','foto-heroe-1024x693.jpg')">
<img src="foto-heroe-1024x693.jpg">
<h3>Aritos de cebolla</h3>
<p>COP:7,200</p>
</div>

<div class="card" onclick="abrir('Picada','Deliciosa combinación de carnes, rellena, chicharrón, acompañada de papa griolla, arepa y salsas ','32000','plato1.jpg')">
<img src="plato1.jpg">
<h3>Picada</h3>
<p>COP:32,000</p>
</div>

<div class="card" onclick="abrir('Burritos','Torta rellena de carne, verdura fresca y salsas intensas','14000','burritos.jpg')">
<img src="burritos.jpg">
<h3>Burritos</h3>
<p>COP:14,000</p>
</div>

<div class="card" onclick="abrir('Pastel de chocolate','Deliciosa porción de pastel con intenso sabor a chocolate','5000','pastel.jpg')">
<img src="pastel.jpg">
<h3>Pastel de chocolate</h3>
<p>COP:5,000</p>
</div>

<div class="card" onclick="abrir('Hot Dog','Salchica jugosa en pan suave con mostaza, salsa y toppings deliciosos','10000','hot-dog.jpg')">
<img src="hot-dog.jpg">
<h3>Hot Dog</h3>
<p>COP:10,000</p>
</div>

<div class="card" onclick="abrir('Pizza de pepperoni','Masa crujiente con queso fundido y pepperoni','6000','pizza.png')">
<img src="pizza.png">
<h3>Pizza de pepperoni</h3>
<p>COP:6,000</p>
</div>

<div class="card" onclick="abrir('Alitas BBQ','Alitas jugosas bañadas es salsa BBQ','16000','alitates.jpg')">
<img src="alitates.jpg">
<h3>Alitas BBQ</h3>
<p>COP:16,000</p>
</div>

<div class="card" onclick="abrir('Hamburguesa','Jugosa hamburguesa con carne a la parrilla, queso derretido, lechuga fresca y salsas especiales','15000','hamburguesa.jpg')">
<img src="hamburguesa.jpg">
<h3>Hamburguesa</h3>
<p>COP:15,000</p>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <img id="imgModal">
    <h2 id="titulo"></h2>
    <p id="desc"></p>
    <p id="precio"></p>
    <button onclick="agregarCarrito()">Agregar al carrito 🛒</button><br>
    <button onclick="cerrar()">Cerrar</button>
  </div>
</div>

<!-- CARRITO -->
<div class="carrito-box">
  <input type="text" id="nombreCliente" placeholder="Tu nombre"><br>
  <button onclick="verPedido()">Ver pedido</button>
</div>

<script>
let carrito = [];
let productoActual = {};

function verMenu(){
  document.getElementById("inicio").style.display = "none";
  document.getElementById("menu").style.display = "block";
}

function abrir(nombre, desc, precio, img){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("titulo").innerText = nombre;
  document.getElementById("desc").innerText = desc;
  document.getElementById("precio").innerText = "COP: " + parseInt(precio).toLocaleString('es-CO');
  document.getElementById("imgModal").src = img;
  productoActual = {nombre, precio};
}

function cerrar(){
  document.getElementById("modal").style.display = "none";
}

function agregarCarrito(){
  carrito.push(productoActual);
  alert("Agregado al carrito 🛒");
}

function verPedido(){
  let nombre = document.getElementById("nombreCliente").value;
  let total = 0;
  let detalle = "";

  carrito.forEach(p => {
    let precioNum = parseInt(p.precio);
    total += precioNum;
    detalle += p.nombre + " - COP: " + precioNum.toLocaleString('es-CO') + "\n";
  });

  let fecha = new Date();

  alert(
    "Cliente: " + nombre + "\n\n" +
    "Pedido:\n" + detalle +
    "\nTotal: COP: " + total.toLocaleString('es-CO') +
    "\n\nFecha: " + fecha.toLocaleString()
  );
}
</script>

</body>
</html>
