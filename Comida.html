<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Restaurante</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

header {
  background: #ff5722;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

/* GRID MEJORADO */
.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.card:hover {
  transform: scale(1.03);
}


.card img {
  width: 100%;
  height: 150px; 
  object-fit: cover;
}

.card h3 {
  margin: 10px;
}

.card p {
  margin: 0 10px 10px;
  color: gray;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  width: 85%;
  max-width: 400px;
}


.modal-content img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  background: #ff5722;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>Menú de comida rápida</header>

<div class="menu">

<div class="card" onclick="abrir('Aritos de cebolla','Cortados a mano, envueltos en una mezcla ligera y fritos hasta alcanzar un dorado perfecto','COP:7,200','foto-heroe-1024x693.jpg')">
<img src="foto-heroe-1024x693.jpg">
<h3>Aritos de cebolla</h3>
<p>COP:7,200</p>
</div>

<div class="card" onclick="abrir('Picada','Deliciosa combinación de carnes, rellena, chicharrón, acompañada de papa griolla, arepa y salsas ','COP:32,000','plato1.jpg')">
<img src="plato1.jpg">
<h3>Picada</h3>
<p>COP:32,000</p>
</div>

<div class="card" onclick="abrir('Burritos','Torta rellena de carne, verdura fresca y salsas intensas','COP:14,000','burritos.jpg')">
<img src="burritos.jpg">
<h3>Burritos</h3>
<p>COP:14,000</p>
</div>

<div class="card" onclick="abrir('Pastel de chocolate','Deliciosa porción de pastel con intenso sabor a chocolate','COP:5,000','pastel.jpg')">
<img src="pastel.jpg">
<h3>Pastel de chocolate</h3>
<p>COP:5,000</p>
</div>

<div class="card" onclick="abrir('HOT-DOG','Salchica jugosa en pan suave con mostaza, salsa y topic deliciosos','COP:10,000','hot-dog.jpg')">
<img src="hot-dog.jpg">
<h3>Hot-Dog</h3>
<p>COP:10,000</p>
</div>




<div class="card" onclick="abrir('Pizza de pepperoni','Masa crujiente con queso fundido y pepperoni','COP:6,000','pizza.png')">
<img src="pizza.png">
<h3>Pizza de pepperoni</h3>
<p>COP:6,000</p>
</div>

<div class="card" onclick="abrir('Alitas Barbiquiu','Deliciosa porción de pastel con intenso sabor a chocolate','COP:16,000','alitates.jpg')">
<img src="alitates.jpg">
<h3>Alitas Barbiquiu</h3>
<p>COP:16,000</p>
</div>

<div class="card" onclick="abrir('Hamburguesa','Jugosa hamburguesa con carne a la parilla, queso derretido, lechugafresca y salsas especiales','COP:15,000','hamburguesa.jpg')">
<img src="hamburguesa.jpg">
<h3>Hamburguesa</h3>
<p>COP:15,000</p>
</div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <img id="imgModal">
    <h2 id="titulo"></h2>
    <p id="desc"></p>
    <p id="precio"></p>
    <button onclick="ordenar()">Ordenar</button><br>
    <button onclick="cerrar()">Cerrar</button>
  </div>
</div>

<script>
function abrir(nombre, desc, precio, img){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("titulo").innerText = nombre;
  document.getElementById("desc").innerText = desc;
  document.getElementById("precio").innerText = precio;
  document.getElementById("imgModal").src = img;
}

function cerrar(){
  document.getElementById("modal").style.display = "none";
}

function ordenar(){
  alert("Pedido agregado 🛒");
}
</script>

</body>
</html>
